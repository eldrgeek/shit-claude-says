[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Allow the frontend to talk to the VPS API
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
